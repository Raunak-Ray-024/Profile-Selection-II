
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSelect Users</title>
    <style>
        body{
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 30px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .app{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .heading{
            font-size: 40px;
            font-weight: bold;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 15px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .inp{
            padding: 12px 20px;
            border-radius: 8px;
            outline: none;
            border: 1px solid #333;
            background-color: #eee5e5;
            color: #000000;
            font-size: 16px;
            width: 250px;
            transition: 0.3s ease;
        }

        .inp:focus{
            border-color: #0072ff;
            box-shadow: 0 0 10px rgba(0,114,255,0.5);
        }

        .cards{
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;   
        }

        .card{
            position: relative;
            width: 200px;
            height: 300px;
            overflow: hidden;
            border-radius:10px ;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .bg-img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .blurred-layer{
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: bottom;
            filter:blur(2px);
            z-index:1;
            mask-image: linear-gradient(to top,rgb(133, 7, 28),rgb(66, 4, 14));
            mask-size: 100% 100%;
            mask-repeat: no-repeat;
            -webkit-mask-image: linear-gradient(to top,green,rgb(3, 52, 3));
        }

        .content{
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgb(6, 79, 104);
            z-index: 2;
        }

        .content h3{
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .content p{
            font-size:14px ;
            color: blueviolet;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    
    <div class="app">
        <h1 class="heading">QuickSelect Users</h1>
        <input class="inp" type="text" placeholder="Search...">
        <div class="cards"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
